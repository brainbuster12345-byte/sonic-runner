<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>Sonic Run</title>
<style>
html,body{margin:0;padding:0;overflow:hidden;background:#111;touch-action:none;-webkit-tap-highlight-color:transparent;user-select:none}
canvas{display:block}
#ui{position:fixed;inset:0;pointer-events:none;z-index:10}
#hud{position:absolute;top:12px;left:14px;right:14px;display:none;justify-content:space-between;font-family:'Courier New',monospace}
#hud.on{display:flex}
#hud b{color:#fc0;font-size:20px;text-shadow:0 1px 4px #000}
#hud .r{color:#fc0;font-size:18px;text-shadow:0 1px 4px #000}
#hud .l{color:#f44;font-size:16px;text-shadow:0 1px 4px #000}
#screen{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;transition:opacity .3s}
#screen.hide{opacity:0;pointer-events:none}
#screen .title{font:bold clamp(50px,14vw,90px) Arial;color:#2979FF;text-shadow:0 4px 0 #0D47A1,0 0 40px rgba(41,121,255,.5)}
#screen .sub{color:#64B5F6;font-size:14px;letter-spacing:6px;margin:8px 0 50px;text-transform:uppercase;font-family:sans-serif}
#screen .go{color:#FF1744;font:bold 46px Arial;text-shadow:0 3px 0 #B71C1C}
#screen .st{color:#FFD740;font:20px Arial;margin:6px 0}
#screen .tap{color:rgba(255,255,255,.55);font:15px/1.6 sans-serif;animation:p 2s ease-in-out infinite}
@keyframes p{0%,100%{opacity:.3}50%{opacity:1}}
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="ui">
  <div id="hud"><b id="sc">0</b><span class="r" id="rg">💍0</span><span class="l" id="lv">❤3</span></div>
  <div id="screen">
    <div class="title">SONIC</div>
    <div class="sub">tap anywhere</div>
    <div class="tap">swipe up = jump · swipe down = dash</div>
  </div>
</div>

<script>
// ═══════ SETUP ═══════
var cv=document.getElementById('c'),g=cv.getContext('2d'),W,H,T=0;
function rs(){W=innerWidth;H=innerHeight;cv.width=W*2;cv.height=H*2;cv.style.width=W+'px';cv.style.height=H+'px';g.setTransform(2,0,0,2,0,0)}
rs();onresize=rs;

// ═══════ AUDIO ═══════
var AC,au=0;
function ea(){if(!au){AC=new(window.AudioContext||window.webkitAudioContext)();au=1}}
function sn(f,d,tp,v){if(!au)return;try{var o=AC.createOscillator(),x=AC.createGain();o.type=tp||'square';o.frequency.value=f;x.gain.setValueAtTime(v||.04,AC.currentTime);x.gain.exponentialRampToValueAtTime(.001,AC.currentTime+d);o.connect(x);x.connect(AC.destination);o.start();o.stop(AC.currentTime+d)}catch(e){}}

// ═══════ GAME ═══════
var state=0,score=0,rings=0,lives=3,dist=0,spd=0;
var GY,shk=0,fla=0;

// Sonic
var P={x:0,y:0,w:26,h:36,vx:0,vy:0,g:0,j:0,sp:0,st:0,it:0,rf:0,rt:0,sx:1,sy:1,f:1,bt:0,tr:[]};

function rp(){P.x=W*.15;P.y=GY-P.h;P.vx=0;P.vy=0;P.g=0;P.j=0;P.sp=0;P.st=0;P.it=0;P.rf=0;P.rt=0;P.sx=1;P.sy=1;P.f=1;P.bt=0;P.tr=[]}

// World
var pl=[],rg=[],en=[],sp=[],dk=[];
var cx2=0,CW=500;

function gen(s){
  pl.push({x:s,y:GY,w:CW,h:200,t:0});
  var r=Math.random;
  if(r()<.3){for(var i=0;i<8;i++)rg.push({x:s+60+i*48,y:GY-50-Math.sin(i/7*Math.PI)*65,d:0,a:r()*6.28})}
  else if(r()<.5){var pw=80+r()*60,py=GY-70-r()*50,px=s+100+r()*150;pl.push({x:px,y:py,w:pw,h:10,t:1,p:r()*6.28});for(var j=0;j<4;j++)rg.push({x:px+15+j*20,y:py-25,d:0,a:r()*6.28})}
  else if(r()<.65){en.push({x:s+200,y:GY,t:0,a:1,fr:0,sx:s+200});en.push({x:s+380,y:GY-75,t:2,a:1,fr:0,hp:r()*6.28});for(var k=0;k<5;k++)rg.push({x:s+60+k*42,y:GY-32,d:0,a:r()*6.28})}
  else if(r()<.8){sp.push({x:s+170,y:GY-12,p:1.5});pl.push({x:s+110,y:GY-160,w:180,h:10,t:1,p:0});for(var m=0;m<6;m++)rg.push({x:s+125+m*26,y:GY-185,d:0,a:r()*6.28})}
  else{for(var n=0;n<3;n++){var px2=s+80+n*140,py2=GY-42-n*38;pl.push({x:px2,y:py2,w:70,h:10,t:1,p:n*2});rg.push({x:px2+22,y:py2-20,d:0,a:r()*6.28});rg.push({x:px2+44,y:py2-20,d:0,a:r()*6.28})}sp.push({x:s+460,y:GY-12,p:1.6})}
  if(r()>.4){var c=2+Math.floor(r()*3);for(var q=0;q<c;q++)rg.push({x:s+r()*CW,y:GY-25-r()*35,d:0,a:r()*6.28})}
  cx2=s+CW;
}

// Particles
function em(x,y,c,n,o){for(var i=0;i<n;i++)dk.push({x:x,y:y,vx:(Math.random()-.5)*(o&&o.s||4),vy:-Math.random()*(o&&o.u||3),l:1,c:c,sz:(o&&o.z||2)+Math.random()*2,gv:.13})}

// ═══════ UPDATE ═══════
function up(dt){
  T+=dt;
  var ts=5+dist/2000;if(ts>12)ts=12;if(P.bt>0){ts=15;P.bt-=dt}
  spd+=(ts-spd)*.04;
  dist+=spd;score=Math.floor(dist/7);
  if(shk>.1)shk*=.82;else shk=0;
  if(fla>0)fla-=dt*.05;

  P.vy+=.48;P.vy=Math.min(P.vy,14);
  P.x+=P.vx;P.y+=P.vy;
  P.vx*=.9;
  P.x+=(W*.15-P.x)*.06;
  P.g=0;

  // platforms
  for(var i=0;i<pl.length;i++){
    var p=pl[i],py=p.t===1?p.y+Math.sin(p.p)*6:p.y;
    if(P.x+P.w>p.x&&P.x<p.x+p.w&&P.vy>=0&&P.y+P.h>py&&P.y+P.h<py+22){
      P.y=py-P.h;P.vy=0;P.g=1;P.j=0;P.sp=0;
      if(P.sy>1.05){P.sx=1.25;P.sy=.75;em(P.x+P.w/2,P.y+P.h,'#aaa',2,{s:2,u:1,z:1})}
    }
  }

  if(P.y>H+50){dl();return}

  P.sx+=(1-P.sx)*.12;P.sy+=(1-P.sy)*.12;
  P.rt+=spd*.06;P.rf=Math.floor(P.rt)%6;
  if(P.it>0)P.it-=dt;if(P.st>0){P.st-=dt;if(P.st<=0)P.sp=0}

  // spawn
  while(cx2<dist+W+400)gen(cx2);

  // cleanup
  var l=dist-150,r=dist+W+250;
  pl=pl.filter(function(p){return p.x+p.w>l&&p.x<r});
  rg=rg.filter(function(x){return x.x>l&&x.x<r&&!x.d});
  en=en.filter(function(e){return e.x>l&&e.x<r});
  sp=sp.filter(function(s){return s.x>l});

  // enemies
  for(var ei=0;ei<en.length;ei++){
    var e=en[ei];if(!e.a)continue;e.fr+=dt;
    if(e.t===0){e.x-=1.3;if(Math.random()>.93)em(e.x+16,e.y-5,'#ff6',1,{s:1,u:0,z:1})}
    else if(e.t===1){if(e.x<e.sx-70)e.d=1;if(e.x>e.sx+70)e.d=-1;e.x+=e.d*.6}
    else{e.hp+=.03;e.x-=.8;e.y+=Math.sin(e.hp)*.6}
  }

  // rings
  for(var ri=0;ri<rg.length;ri++){
    var rn=rg[ri];if(rn.d)continue;rn.a+=dt*2.5;
    if(P.x<rn.x+11&&P.x+P.w>rn.x-11&&P.y<rn.y+11&&P.y+P.h>rn.y-11){
      rn.d=1;rings++;score+=100;
      sn(1200,.06,'sine',.04);setTimeout(function(){sn(1800,.08,'sine',.03)},30);
      em(rn.x,rn.y,'#fc0',5,{s:3,u:2,z:1.5})
    }
  }

  // springs
  for(var si=0;si<sp.length;si++){
    var s=sp[si];
    if(P.x+P.w>s.x-12&&P.x<s.x+24&&P.y+P.h>s.y-6&&P.y+P.h<s.y+20&&P.vy>0){
      P.vy=-12*s.p;P.j=1;P.g=0;P.sx=.6;P.sy=1.4;
      sn(440,.07,'sine',.04);setTimeout(function(){sn(880,.1,'sine',.03)},40);
      em(s.x,s.y,'#4f4',4,{s:2.5,u:3})
    }
  }

  // enemy collision
  for(var ci=0;ci<en.length;ci++){
    var ec=en[ci];if(!ec.a)continue;
    var ex=ec.x-17,ey=ec.y-28;
    if(P.x+3<ex+34&&P.x+P.w-3>ex&&P.y+3<ey+30&&P.y+P.h-3>ey){
      if(P.sp||P.vy>1.5){
        ec.a=0;P.vy=-7;score+=200;
        sn(180,.1,'sawtooth',.04);setTimeout(function(){sn(700,.07,'sine',.03)},50);
        em(ec.x,ec.y-10,'#f54',10,{s:5,u:4,z:3});shk=5;fla=.1
      }else if(P.it<=0)ht()
    }
  }

  // dust
  if(P.g&&spd>3&&Math.random()>.6)em(P.x,P.y+P.h,'rgba(180,180,180,.3)',1,{s:1,u:.5,z:1});
  // trail
  if(spd>8||P.bt>0)P.tr.push({x:P.x+P.w/2,y:P.y+P.h/2,l:1});
  for(var ti=0;ti<P.tr.length;ti++)P.tr[ti].l-=.06;
  P.tr=P.tr.filter(function(t){return t.l>0});

  // particles
  for(var pi=0;pi<dk.length;pi++){var d=dk[pi];d.x+=d.vx;d.y+=d.vy;d.vy+=d.gv;d.l-=.025}
  dk=dk.filter(function(d){return d.l>0});

  document.getElementById('sc').textContent=score;
  document.getElementById('rg').textContent='💍'+rings;
  document.getElementById('lv').textContent='❤'+lives;
}

function ht(){
  if(P.it>0)return;
  if(rings>0){var lost=Math.min(rings,15);for(var i=0;i<lost;i++){var a=i/lost*6.28;rg.push({x:P.x+P.w/2+Math.cos(a)*16,y:P.y+P.h/2+Math.sin(a)*16,d:0,a:0,vx:Math.cos(a)*2.2,vy:Math.sin(a)*2.2-1.5,t:1,l:2})}
    rings=Math.max(0,rings-lost);P.it=2;P.vy=-5;
    sn(120,.2,'sawtooth',.05);em(P.x+P.w/2,P.y+P.h/2,'#fc0',12,{s:7,u:3,z:2});shk=7;fla=.15}
  else dl()
}

function dl(){
  lives--;sn(120,.25,'sawtooth',.06);shk=10;fla=.3;em(P.x+P.w/2,P.y+P.h/2,'#29f',20,{s:8,u:6,z:3});
  if(lives<=0){state=0;var s=document.getElementById('screen');s.classList.remove('hide');s.innerHTML='<div class="go">GAME OVER</div><div class="st">Score: '+score+'</div><div class="st">Rings: '+rings+'</div><div class="st">Distance: '+Math.floor(dist/10)+'m</div><div class="tap">tap to retry</div>'}
  else{P.it=3;P.y=GY-P.h-10;P.vy=0;P.j=1}
}

// ═══════ DRAW ═══════
function drawBG(){
  var gr=g.createLinearGradient(0,0,0,H);
  gr.addColorStop(0,'#050d1f');gr.addColorStop(.3,'#0b1e3a');gr.addColorStop(.6,'#1565C0');gr.addColorStop(.85,'#42A5F5');gr.addColorStop(1,'#90CAF9');
  g.fillStyle=gr;g.fillRect(0,0,W,H);
  // stars
  g.fillStyle='#fff';
  for(var i=0;i<40;i++){
    var sx2=((i*73+20-dist*.01)%(W*2)+W*2)%(W*2);
    g.globalAlpha=.2+Math.sin(T*1.2+i)*.2;
    g.beginPath();g.arc(sx2,(i*37+10)%(H*.5),1+(i%3)*.4,0,6.28);g.fill()
  }
  g.globalAlpha=1;
  // mountains far
  g.fillStyle='#091830';
  for(var fi=0;fi<12;fi++){var fx=((fi*190-80-dist*.07)%(190*12)+190*12)%(190*12)-80;g.beginPath();g.moveTo(fx,H*.63);g.lineTo(fx+95,H*.63-80-(fi*17%60));g.lineTo(fx+190,H*.63);g.fill()}
  // mountains near
  g.fillStyle='#0d2e52';
  for(var ni=0;ni<16;ni++){var nx=((ni*140-50-dist*.2)%(140*16)+140*16)%(140*16)-50;g.beginPath();g.moveTo(nx,H*.7);g.quadraticCurveTo(nx+65,H*.7-45-(ni*13%40),nx+130,H*.7);g.fill()}
  // trees
  g.fillStyle='#1B5E20';
  for(var ti2=0;ti2<25;ti2++){var tx=((ti2*90+30-dist*.4)%(90*25)+90*25)%(90*25);var th=20+ti2*7%25;g.beginPath();g.moveTo(tx,GY);g.lineTo(tx+9,GY-th);g.lineTo(tx+18,GY);g.fill()}
  // ground
  var gg=g.createLinearGradient(0,GY,0,GY+12);gg.addColorStop(0,'#43A047');gg.addColorStop(1,'#2E7D32');
  g.fillStyle=gg;g.fillRect(0,GY,W,12);
  // checker
  var ts=14,ox=-(dist%ts);
  for(var c=-1;c<W/ts+2;c++)for(var r=0;r<(H-GY)/ts+1;r++){g.fillStyle=((c+Math.floor(dist/ts)+r)%2===0)?'#E65100':'#BF360C';g.fillRect(ox+c*ts,GY+12+r*ts,ts,ts)}
  // grass
  g.strokeStyle='#66BB6A';g.lineWidth=1;
  for(var gx=0;gx<W;gx+=9){var gx2=gx+((dist*1.2)%9);var sw=Math.sin(T*3+gx*.1)*1.5;g.beginPath();g.moveTo(gx2,GY);g.quadraticCurveTo(gx2+sw,GY-4,gx2+sw*1.3,GY-7);g.stroke()}
}

function drawPlats(){
  for(var i=0;i<pl.length;i++){
    var p=pl[i];if(p.t===0)continue;
    var py=p.y+Math.sin(p.p)*6;
    g.fillStyle='#4E342E';g.fillRect(p.x,py,p.w,p.h);
    g.fillStyle='#6D4C41';g.fillRect(p.x,py,p.w,2.5);
    g.fillStyle='#8D6E63';
    for(var rx=p.x+7;rx<p.x+p.w-3;rx+=16){g.beginPath();g.arc(rx,py+p.h/2,1.5,0,6.28);g.fill()}
  }
}

function drawRings(){
  for(var i=0;i<rg.length;i++){
    var r=rg[i];if(r.d){if(r.t){r.x+=r.vx||0;r.y+=r.vy||0;r.vy=(r.vy||0)+.12;r.l-=.02;if(r.l<=0)continue}g.globalAlpha=r.l||1;continue}
    var sz=8,sh=Math.sin(r.a)*.1;
    g.save();g.translate(r.x,r.y);g.scale(1+sh,1-sh);
    g.shadowColor='#fc0';g.shadowBlur=8;
    g.beginPath();g.arc(0,0,sz,0,6.28);g.fillStyle='#FFD700';g.fill();
    g.strokeStyle='#FFA000';g.lineWidth=1.5;g.stroke();
    g.shadowBlur=0;
    g.beginPath();g.arc(0,0,sz*.38,0,6.28);g.fillStyle='#FFF8E1';g.fill();
    g.beginPath();g.arc(-2,-2,2,0,6.28);g.fillStyle='rgba(255,255,255,.6)';g.fill();
    g.restore();g.globalAlpha=1
  }
}

function drawSonic(){
  var x=P.x,y=P.y,w=P.w,h=P.h;
  if(P.it>0&&Math.floor(P.it*12)%2===0)return;
  // trail
  for(var ti=0;ti<P.tr.length;ti++){var t=P.tr[ti];g.globalAlpha=t.l*.2;g.fillStyle=P.bt>0?'#f30':'#29f';g.beginPath();g.arc(t.x,t.y,8*t.l,0,6.28);g.fill()}
  g.globalAlpha=1;
  g.save();g.translate(x+w/2,y+h/2);g.scale(P.f*P.sx,P.sy);

  if(P.sp&&P.st>0){
    // spin ball
    g.rotate(T*18);
    g.beginPath();g.arc(0,0,w*.4,0,6.28);g.fillStyle='#1565C0';g.fill();
    g.strokeStyle='#2979FF';g.lineWidth=2;g.stroke();
    for(var si=0;si<5;si++){g.save();g.rotate(si*1.256);g.beginPath();g.moveTo(w*.34,-2);g.lineTo(w*.58,0);g.lineTo(w*.34,2);g.fillStyle='#0D47A1';g.fill();g.restore()}
    g.fillStyle='#fff';g.beginPath();g.arc(-4,-2,3.5,0,6.28);g.fill();g.beginPath();g.arc(4,-2,3.5,0,6.28);g.fill();
    g.fillStyle='#111';g.beginPath();g.arc(-3,-2,1.8,0,6.28);g.fill();g.beginPath();g.arc(5,-2,1.8,0,6.28);g.fill();
  }else{
    var bnc=P.g?Math.sin(T*13)*1:0;
    g.rotate(P.g?Math.sin(T*6)*.02:0);g.translate(0,bnc);

    // shadow
    if(P.g){g.fillStyle='rgba(0,0,0,.15)';g.beginPath();g.ellipse(0,h/2+2,w*.35,3,0,0,6.28);g.fill()}

    // legs
    var la=P.g?Math.sin(T*(3+Math.min(spd,12)))*9:0;
    // back
    g.save();g.translate(-3,P.g?h*.26:0);g.rotate(P.g?la*.025:-.3);
    g.fillStyle='#D32F2F';g.beginPath();g.ellipse(0,0,5,7,0,0,6.28);g.fill();
    g.fillStyle='#B71C1C';g.beginPath();g.ellipse(1,P.g?5:-3,7,3,0,0,6.28);g.fill();
    g.fillStyle='#fff';g.beginPath();g.ellipse(2,P.g?4.5:-4,4.5,1.2,0,0,6.28);g.fill();
    g.restore();

    // body
    g.beginPath();g.ellipse(0,2,w*.32,h*.3,0,0,6.28);g.fillStyle='#1565C0';g.fill();
    g.beginPath();g.ellipse(1,6,w*.2,h*.16,.06,0,6.28);g.fillStyle='#BBDEFB';g.fill();

    // arms
    g.save();g.translate(-w*.26,0);g.rotate(P.g?la*.012:.15);g.fillStyle='#1976D2';g.beginPath();g.ellipse(0,3,3.5,7,.1,0,6.28);g.fill();g.fillStyle='#BBDEFB';g.beginPath();g.arc(0,9,3,0,6.28);g.fill();g.restore();
    g.save();g.translate(w*.26,0);g.rotate(P.g?-la*.012:-.1);g.fillStyle='#1976D2';g.beginPath();g.ellipse(0,3,3.5,7,-.1,0,6.28);g.fill();g.fillStyle='#BBDEFB';g.beginPath();g.arc(0,9,3,0,6.28);g.fill();g.restore();

    // head
    g.beginPath();g.ellipse(1,-h*.18,w*.3,h*.27,.06,0,6.28);g.fillStyle='#1976D2';g.fill();

    // spikes back
    g.fillStyle='#0D47A1';
    var spk=[-2.5,-1.8,-1.1];
    for(var si2=0;si2<spk.length;si2++){g.save();g.rotate(spk[si2]+.06);g.beginPath();g.moveTo(-w*.16,-1);var sl=12+si2*3;g.lineTo(-w*.16-sl,-2+si2);g.lineTo(-w*.16-sl+3,4);g.fill();g.restore()}
    // spikes front
    g.fillStyle='#1565C0';
    [-.3,.2,.65].forEach(function(a){g.save();g.rotate(a);g.beginPath();g.moveTo(w*.22,-6);g.lineTo(w*.48,-2);g.lineTo(w*.18,2);g.fill();g.restore()});

    // ears
    g.fillStyle='#1565C0';
    g.save();g.translate(-w*.18,-h*.28);g.rotate(-.25);g.beginPath();g.ellipse(0,0,4.5,7,0,0,6.28);g.fill();g.restore();
    g.save();g.translate(w*.2,-h*.26);g.rotate(.25);g.beginPath();g.ellipse(0,0,4.5,7,0,0,6.28);g.fill();g.restore();

    // eyes
    var po=P.vy<-2.5?-1.5:P.vy>2.5?1.5:0;
    g.fillStyle='#fff';
    g.beginPath();g.ellipse(-3,-h*.22,6,8,-.06,0,6.28);g.fill();
    g.beginPath();g.ellipse(8,-h*.2,6,8,.06,0,6.28);g.fill();
    g.fillStyle='#111';
    g.beginPath();g.arc(-1,-h*.22+po,2.8,0,6.28);g.fill();
    g.beginPath();g.arc(10,-h*.2+po,2.8,0,6.28);g.fill();
    g.fillStyle='#fff';
    g.beginPath();g.arc(0,-h*.24,1.2,0,6.28);g.fill();
    g.beginPath();g.arc(11,-h*.22,1.2,0,6.28);g.fill();

    // nose
    g.beginPath();g.ellipse(13,-h*.11,4,3,.12,0,6.28);g.fillStyle='#0D47A1';g.fill();
    g.beginPath();g.arc(12.5,-h*.12,1.2,0,6.28);g.fillStyle='rgba(255,255,255,.18)';g.fill();

    // mouth
    g.strokeStyle='#0D47A1';g.lineWidth=1.1;
    g.beginPath();g.arc(10,-h*.05,4,.1,1);g.stroke();

    // front leg
    g.save();g.translate(3,P.g?h*.26:0);g.rotate(P.g?la*.025:.3);
    g.fillStyle='#E53935';g.beginPath();g.ellipse(0,0,5,7,0,0,6.28);g.fill();
    g.fillStyle='#C62828';g.beginPath();g.ellipse(-1,P.g?5:-3,7,3,0,0,6.28);g.fill();
    g.fillStyle='#fff';g.beginPath();g.ellipse(-2,P.g?4.5:-4,4.5,1.2,0,0,6.28);g.fill();
    g.restore();

    // boost glow
    if(P.bt>0){g.shadowColor='#f30';g.shadowBlur=15;g.beginPath();g.arc(0,0,w*.45,0,6.28);g.fillStyle='rgba(255,60,0,.1)';g.fill();g.shadowBlur=0}
  }
  g.restore();
}

function drawEnms(){
  for(var i=0;i<en.length;i++){
    var e=en[i];if(!e.a)continue;
    g.save();g.translate(e.x,e.y);
    if(e.t===0){// motobug
      g.fillStyle='#D32F2F';g.beginPath();g.ellipse(0,-9,18,10,0,0,6.28);g.fill();
      g.fillStyle='#B71C1C';g.beginPath();g.ellipse(0,-12,14,6,0,Math.PI,6.28);g.fill();
      g.fillStyle='#fff';g.beginPath();g.arc(8,-12,4,0,6.28);g.fill();
      g.fillStyle='#111';g.beginPath();g.arc(10,-12,2,0,6.28);g.fill();
      g.fillStyle='#333';g.beginPath();g.arc(-8,0,5,0,6.28);g.fill();g.beginPath();g.arc(8,0,5,0,6.28);g.fill();
      var fk=Math.sin(T*18)*2.5;
      g.fillStyle='#FF9800';g.beginPath();g.moveTo(-18,-10);g.lineTo(-25-fk,-8);g.lineTo(-18,-6);g.fill();
    }else if(e.t===1){// crab
      g.fillStyle='#E53935';g.beginPath();g.ellipse(0,-8,15,8,0,0,6.28);g.fill();
      var ca=Math.sin(e.fr*3.5)*3.5;
      g.fillStyle='#D32F2F';g.beginPath();g.ellipse(-19,-12+ca,6,4,-.3,0,6.28);g.fill();g.beginPath();g.ellipse(19,-12-ca,6,4,.3,0,6.28);g.fill();
      g.fillStyle='#fff';g.beginPath();g.arc(-4,-12,3,0,6.28);g.fill();g.beginPath();g.arc(4,-12,3,0,6.28);g.fill();
      g.fillStyle='#111';g.beginPath();g.arc(-3,-12,1.5,0,6.28);g.fill();g.beginPath();g.arc(5,-12,1.5,0,6.28);g.fill();
    }else{// bee
      var wf=Math.sin(T*20)*4;
      g.fillStyle='rgba(160,210,255,.45)';g.beginPath();g.ellipse(-12,-4+wf,10,5,-.2,0,6.28);g.fill();g.beginPath();g.ellipse(12,-4-wf,10,5,.2,0,6.28);g.fill();
      g.fillStyle='#FDD835';g.beginPath();g.ellipse(0,0,8,12,0,0,6.28);g.fill();
      g.fillStyle='#333';g.fillRect(-8,-2,16,2);g.fillRect(-6,4,12,2);
      g.fillStyle='#FBC02D';g.beginPath();g.arc(0,-10,5.5,0,6.28);g.fill();
      g.fillStyle='#fff';g.beginPath();g.arc(-2,-11,3,0,6.28);g.fill();g.beginPath();g.arc(2,-11,3,0,6.28);g.fill();
      g.fillStyle='#111';g.beginPath();g.arc(-1,-11,1.5,0,6.28);g.fill();g.beginPath();g.arc(3,-11,1.5,0,6.28);g.fill();
    }
    g.restore();
  }
}

function drawSpr(){
  for(var i=0;i<sp.length;i++){
    var s=sp[i];var comp=Math.abs(P.x+P.w/2-s.x)<20&&P.y+P.h>s.y-2?.6:1;
    g.save();g.translate(s.x,s.y);g.scale(1,comp);
    g.fillStyle='#555';g.fillRect(-10,0,20,6);
    g.strokeStyle='#E53935';g.lineWidth=2.2;g.beginPath();g.moveTo(-6,0);
    for(var j=0;j<3;j++){g.lineTo(6,-4-j*4.5);g.lineTo(-6,-8-j*4.5)}g.stroke();
    g.fillStyle='#D32F2F';g.fillRect(-8,-17,16,4.5);
    g.fillStyle='#FFC107';g.beginPath();g.moveTo(0,-22);g.lineTo(-3.5,-19);g.lineTo(3.5,-19);g.fill();
    g.restore();
  }
}

function drawParts(){
  for(var i=0;i<dk.length;i++){var d=dk[i];g.globalAlpha=d.l;g.fillStyle=d.c;g.beginPath();g.arc(d.x,d.y,d.sz*d.l,0,6.28);g.fill()}
  g.globalAlpha=1;
}

function drawSL(){
  if(spd<8)return;var a=(spd-8)/8;
  g.strokeStyle='rgba(255,255,255,'+(.03*a)+')';g.lineWidth=1;
  for(var i=0;i<5*a;i++){var ly=Math.random()*H,lx=Math.random()*W,ln=spd*4+Math.random()*20;g.beginPath();g.moveTo(lx,ly);g.lineTo(lx-ln,ly);g.stroke()}
}

// ═══════ LOOP ═══════
var lt=0;
function frame(ts){
  var dt=Math.min((ts-lt)/1000,.05);lt=ts;
  if(state)up(dt);
  g.clearRect(0,0,W,H);
  g.save();
  if(shk>.3)g.translate((Math.random()-.5)*shk,(Math.random()-.5)*shk);
  drawBG();drawPlats();drawSpr();drawRings();drawEnms();drawSonic();drawParts();drawSL();
  if(fla>0){g.fillStyle='rgba(255,255,255,'+fla+')';g.fillRect(0,0,W,H)}
  g.restore();
  requestAnimationFrame(frame);
}

// ═══════ INPUT ═══════
function go(){
  if(state)return;ea();
  state=1;score=0;rings=0;lives=3;dist=0;spd=5;shk=0;fla=0;T=0;
  GY=H*.73;cx2=0;pl=[];rg=[];en=[];sp=[];dk=[];
  rp();gen(0);
  document.getElementById('screen').classList.add('hide');
  document.getElementById('hud').classList.add('on');
}

function jmp(){
  if(!state){go();return}
  if(P.g){P.vy=-11;P.j=1;P.g=0;P.sx=1.2;P.sy=.8;sn(280,.1,'triangle',.04);em(P.x+P.w/2,P.y+P.h,'rgba(255,255,255,.35)',3,{s:2,u:1,z:1.2})}
}
function dash(){
  if(!state)return;
  if(P.g){P.sp=1;P.st=1;P.sx=.45;P.sy=1.5;sn(500,.05,'sawtooth',.03);setTimeout(function(){sn(650,.05,'sawtooth',.03)},20);spd=Math.min(spd+2.5,15)}
}

var ty=0;
cv.addEventListener('touchstart',function(e){e.preventDefault();ty=e.touches[0].clientY},{passive:false});
cv.addEventListener('touchend',function(e){e.preventDefault();var dy=ty-e.changedTouches[0].clientY;if(!state){go();return}dy>18?jmp():dy<-18?dash():jmp()},{passive:false});
document.getElementById('screen').addEventListener('touchend',function(e){e.preventDefault();go()},{passive:false});
document.addEventListener('keydown',function(e){if(e.repeat)return;if(e.code==='Space'||e.code==='ArrowUp')jmp();if(e.code==='ArrowDown')dash()});

GY=H*.73;gen(0);requestAnimationFrame(frame);
</script>
