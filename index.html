<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>NEON VOID</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden;background:#000;touch-action:none;user-select:none;-webkit-user-select:none}
canvas{display:block}
.ov{position:fixed;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:20;transition:opacity .5s}
.ov.hide{opacity:0;pointer-events:none}
#title{background:radial-gradient(ellipse at 50% 80%,rgba(120,0,255,.15),transparent 60%),linear-gradient(180deg,#000 0%,#0a001a 100%)}
#title h1{font:900 clamp(42px,10vw,72px) 'Courier New',monospace;color:#fff;letter-spacing:8px;text-shadow:0 0 20px #a0f,0 0 60px #60f,0 0 100px #40a;animation:glow 3s ease-in-out infinite alternate}
@keyframes glow{0%{text-shadow:0 0 20px #a0f,0 0 60px #60f}100%{text-shadow:0 0 30px #f0a,0 0 80px #a0f,0 0 120px #60f}}
#title .sub{color:#a78bfa;font-size:13px;letter-spacing:10px;text-transform:uppercase;margin:8px 0 60px;font-family:'Courier New',monospace}
.tap{color:rgba(255,255,255,.45);font:14px/1.7 sans-serif;animation:b 2.2s ease-in-out infinite}
@keyframes b{0%,100%{opacity:.25}50%{opacity:.9}}
#gameover{background:rgba(0,0,0,.85);display:none}
#gameover h1{font:900 48px 'Courier New',monospace;color:#f0f;text-shadow:0 0 30px #f0f}
#gameover .st{color:#c084fc;font:22px 'Courier New',monospace;margin:6px 0}
#hud{position:fixed;top:0;left:0;right:0;padding:16px 20px;display:none;justify-content:space-between;pointer-events:none;z-index:15;font-family:'Courier New',monospace}
#hud.on{display:flex}
#hud .s{color:#fff;font-size:22px;font-weight:900;text-shadow:0 0 12px #a0f}
#hud .o{color:#f0f;font-size:18px;text-shadow:0 0 10px #f0f}
#hud .l{color:#0ff;font-size:16px;text-shadow:0 0 10px #0ff}
#bar{margin-top:6px;width:90px;height:4px;background:rgba(255,255,255,.1);border-radius:2px;overflow:hidden}
#fill{height:100%;width:20%;background:linear-gradient(90deg,#60f,#f0a);border-radius:2px;transition:width .15s}
</style>
</head>
<body>
<div id="hud"><div><div class="s" id="sc">0</div><div class="o" id="ob">⚡0</div><div id="bar"><div id="fill"></div></div></div><div class="l" id="lv">♥♥♥</div></div>
<div class="ov" id="title"><h1>NEON VOID</h1><div class="sub">fly through the void</div><div class="tap">tap to fly<br>swipe left/right to steer<br>swipe up to boost</div></div>
<div class="ov" id="gameover"><h1>VOIDED</h1><div class="st" id="gs"></div><div class="st" id="go"></div><div class="st" id="gd"></div><div class="tap" style="margin-top:30px">tap to retry</div></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
// ═══════════════ ENGINE ═══════════════
var W=innerWidth,H=innerHeight;
var renderer=new THREE.WebGLRenderer({antialias:true,alpha:false});
renderer.setSize(W,H);
renderer.setPixelRatio(Math.min(devicePixelRatio,2));
renderer.toneMapping=THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure=1.2;
document.body.appendChild(renderer.domElement);

var scene=new THREE.Scene();
scene.fog=new THREE.FogExp2(0x000011,0.008);

var camera=new THREE.PerspectiveCamera(70,W/H,0.1,500);
camera.position.set(0,4,8);
camera.lookAt(0,2,-10);

window.addEventListener('resize',function(){
  W=innerWidth;H=innerHeight;
  renderer.setSize(W,H);
  camera.aspect=W/H;
  camera.updateProjectionMatrix();
});

// ═══════════════ AUDIO ═══════════════
var AC,au=0;
function ea(){if(!au){try{AC=new(window.AudioContext||window.webkitAudioContext)();au=1}catch(e){}}}
function sn(f,d,tp,v,dl){if(!au)return;try{var o=AC.createOscillator(),x=AC.createGain();o.type=tp||'sawtooth';o.frequency.value=f;if(dl)setTimeout(function(){x.gain.setValueAtTime(v||.03,AC.currentTime);x.gain.exponentialRampToValueAtTime(.001,AC.currentTime+d);o.connect(x);x.connect(AC.destination);o.start();o.stop(AC.currentTime+d+dl)},dl);else{x.gain.setValueAtTime(v||.03,AC.currentTime);x.gain.exponentialRampToValueAtTime(.001,AC.currentTime+d);o.connect(x);x.connect(AC.destination);o.start();o.stop(AC.currentTime+d)}}catch(e){}}
function sfxCollect(){sn(880,.08,'sine',.04);sn(1320,.1,'sine',.03,40)}
function sfxHit(){sn(80,.3,'sawtooth',.05);sn(40,.4,'square',.03)}
function sfxBoost(){sn(220,.15,'sawtooth',.04);sn(440,.12,'sine',.03,50)}

// ═══════════════ MATERIALS ═══════════════
var gridMat=new THREE.ShaderMaterial({
  uniforms:{uTime:{value:0},uColor1:{value:new THREE.Color(0x6600ff)},uColor2:{value:new THREE.Color(0xff00aa)}},
  vertexShader:`
    varying vec2 vUv;
    varying float vZ;
    void main(){
      vUv=uv;
      vZ=position.z;
      gl_Position=projectionMatrix*modelViewMatrix*vec4(position,1.0);
    }`,
  fragmentShader:`
    uniform float uTime;
    uniform vec3 uColor1;
    uniform vec3 uColor2;
    varying vec2 vUv;
    varying float vZ;
    void main(){
      vec2 grid=abs(fract(vUv*30.0-0.5)-0.5)/fwidth(vUv*30.0);
      float line=min(grid.x,grid.y);
      float g=1.0-min(line,1.0);
      float pulse=sin(vZ*0.1+uTime*2.0)*0.5+0.5;
      vec3 col=mix(uColor1,uColor2,pulse);
      float fog=smoothstep(0.0,1.0,1.0-vUv.y);
      gl_FragColor=vec4(col*g*fog*0.8,g*fog*0.3);
    }`,
  transparent:true,side:THREE.DoubleSide
});

var glowMats={
  pink:new THREE.MeshBasicMaterial({color:0xff00aa}),
  cyan:new THREE.MeshBasicMaterial({color:0x00ffff}),
  purple:new THREE.MeshBasicMaterial({color:0x8800ff}),
  orange:new THREE.MeshBasicMaterial({color:0xff6600}),
  white:new THREE.MeshBasicMaterial({color:0xffffff}),
};

// ═══════════════ WORLD ═══════════════
// Grid floor
var gridGeo=new THREE.PlaneGeometry(200,400,1,1);
gridGeo.rotateX(-Math.PI/2);
var grid=new THREE.Mesh(gridGeo,gridMat);
grid.position.z=-180;
scene.add(grid);

// Sun
var sunGeo=new THREE.CircleGeometry(30,64);
var sunMat=new THREE.ShaderMaterial({
  uniforms:{uTime:{value:0}},
  vertexShader:`varying vec2 vUv;void main(){vUv=uv;gl_Position=projectionMatrix*modelViewMatrix*vec4(position,1.0);}`,
  fragmentShader:`
    uniform float uTime;
    varying vec2 vUv;
    void main(){
      vec2 c=vUv-0.5;
      float d=length(c);
      float sun=smoothstep(0.5,0.3,d);
      float stripe=step(0.0,sin(vUv.y*40.0+uTime*0.5));
      float cut=smoothstep(0.15,0.35,vUv.y);
      float final_=sun*(cut*0.7+stripe*0.3*step(vUv.y,0.5));
      vec3 col=mix(vec3(1.0,0.1,0.5),vec3(1.0,0.6,0.2),vUv.y);
      gl_FragColor=vec4(col*final_,final_);
    }`,
  transparent:true,side:THREE.DoubleSide
});
var sun=new THREE.Mesh(sunGeo,sunMat);
sun.position.set(0,25,-200);
scene.add(sun);

// Mountains
function mkMountain(x,z,h,w,col){
  var geo=new THREE.ConeGeometry(w,h,4+Math.floor(Math.random()*3));
  var mat=new THREE.MeshBasicMaterial({color:col,transparent:true,opacity:0.6});
  var m=new THREE.Mesh(geo,mat);
  m.position.set(x,h/2-2,z);
  m.rotation.y=Math.random()*Math.PI;
  scene.add(m);
  return m;
}
var mountains=[];
for(var mi=0;mi<20;mi++){
  var mx=(Math.random()-0.5)*160;
  var mz=-60-Math.random()*140;
  var mh=10+Math.random()*25;
  var mw=5+Math.random()*12;
  var mc=Math.random()>.5?0x1a0033:0x0d0022;
  mountains.push(mkMountain(mx,mz,mh,mw,mc));
}

// Stars
var starGeo=new THREE.BufferGeometry();
var starPos=[];
for(var si=0;si<2000;si++){
  starPos.push((Math.random()-0.5)*300,20+Math.random()*100,-50-Math.random()*250);
}
starGeo.setAttribute('position',new THREE.Float32BufferAttribute(starPos,3));
var starMat=new THREE.PointsMaterial({color:0xffffff,size:0.3,transparent:true,opacity:0.7});
scene.add(new THREE.Points(starGeo,starMat));

// ═══════════════ PLAYER ═══════════════
var player=new THREE.Group();

// Ship body - diamond shape
var shipGeo=new THREE.OctahedronGeometry(0.6,0);
shipGeo.scale(1,0.4,1.8);
var shipMat2=new THREE.MeshBasicMaterial({color:0x2200aa,transparent:true,opacity:0.9});
var shipBody=new THREE.Mesh(shipGeo,shipMat2);
player.add(shipBody);

// Ship glow outline
var shipGlowGeo=new THREE.OctahedronGeometry(0.7,0);
shipGlowGeo.scale(1,0.4,1.8);
var shipGlowMat=new THREE.MeshBasicMaterial({color:0x00ffff,wireframe:true,transparent:true,opacity:0.6});
var shipGlow=new THREE.Mesh(shipGlowGeo,shipGlowMat);
player.add(shipGlow);

// Engine glow
var engGeo=new THREE.SphereGeometry(0.2,8,8);
var engMat=new THREE.MeshBasicMaterial({color:0xff00ff,transparent:true,opacity:0.8});
var engine=new THREE.Mesh(engGeo,engMat);
engine.position.set(0,0,0.8);
player.add(engine);

// Engine trail light
var engLight=new THREE.PointLight(0xff00ff,2,8);
engLight.position.set(0,0,1);
player.add(engLight);

// Headlight
var headLight=new THREE.PointLight(0x00ffff,3,15);
headLight.position.set(0,0,-2);
player.add(headLight);

player.position.set(0,2,0);
scene.add(player);

// Ambient light
scene.add(new THREE.AmbientLight(0x221144,0.5));
var dirLight=new THREE.DirectionalLight(0xff00ff,0.3);
dirLight.position.set(0,10,-5);
scene.add(dirLight);

// ═══════════════ OBSTACLES & ORBS ═══════════════
var obstacles=[];
var orbs=[];
var particles=[];

function mkObstacle(){
  var types=['barrier','ring','wall'];
  var t=types[Math.floor(Math.random()*types.length)];
  var g=new THREE.Group();
  var col=[0xff00aa,0x00ffff,0xff6600,0xaa00ff][Math.floor(Math.random()*4)];

  if(t==='barrier'){
    var geo=new THREE.BoxGeometry(3,1.5,0.5);
    var mat=new THREE.MeshBasicMaterial({color:col,transparent:true,opacity:0.7});
    var mesh=new THREE.Mesh(geo,mat);
    g.add(mesh);
    var wf=new THREE.Mesh(geo,new THREE.MeshBasicMaterial({color:0xffffff,wireframe:true,transparent:true,opacity:0.3}));
    g.add(wf);
    g.userData={w:3,h:1.5,type:'obs'};
  }else if(t==='ring'){
    var rGeo=new THREE.TorusGeometry(1.2,0.15,8,24);
    var rMat=new THREE.MeshBasicMaterial({color:col,transparent:true,opacity:0.8});
    var ring=new THREE.Mesh(rGeo,rMat);
    ring.rotation.x=Math.PI/2;
    g.add(ring);
    g.userData={w:2.4,h:2.4,type:'obs'};
  }else{
    var wGeo=new THREE.BoxGeometry(0.5,3,2);
    var wMat=new THREE.MeshBasicMaterial({color:col,transparent:true,opacity:0.6});
    g.add(new THREE.Mesh(wGeo,wMat));
    g.add(new THREE.Mesh(wGeo,new THREE.MeshBasicMaterial({color:0xffffff,wireframe:true,transparent:true,opacity:0.2})));
    g.userData={w:0.5,h:3,type:'obs'};
  }

  var light=new THREE.PointLight(col,1.5,6);
  g.add(light);

  g.position.set((Math.random()-0.5)*10,0.5+Math.random()*2,-120-Math.random()*30);
  scene.add(g);
  obstacles.push(g);
}

function mkOrb(){
  var g=new THREE.Group();
  var geo=new THREE.SphereGeometry(0.35,12,12);
  var mat=new THREE.MeshBasicMaterial({color:0xff00ff,transparent:true,opacity:0.9});
  g.add(new THREE.Mesh(geo,mat));
  var glowGeo=new THREE.SphereGeometry(0.5,8,8);
  g.add(new THREE.Mesh(glowGeo,new THREE.MeshBasicMaterial({color:0xff44ff,transparent:true,opacity:0.25})));
  var pl=new THREE.PointLight(0xff00ff,1,4);
  g.add(pl);
  g.position.set((Math.random()-0.5)*8,1+Math.random()*3,-100-Math.random()*40);
  g.userData={type:'orb'};
  scene.add(g);
  orbs.push(g);
}

// Particles
function emit(pos,color,n,spread){
  for(var i=0;i<n;i++){
    var geo=new THREE.SphereGeometry(0.05+Math.random()*0.08,4,4);
    var mat=new THREE.MeshBasicMaterial({color:color,transparent:true,opacity:1});
    var p=new THREE.Mesh(geo,mat);
    p.position.copy(pos);
    p.userData.vx=(Math.random()-0.5)*spread;
    p.userData.vy=(Math.random()-0.5)*spread;
    p.userData.vz=(Math.random()-0.5)*spread;
    p.userData.life=1;
    scene.add(p);
    particles.push(p);
  }
}

// ═══════════════ GAME STATE ═══════════════
var state=0,score=0,orbs2=0,lives=3,dist2=0,spd2=0;
var targetX=0,targetY=2,boostT=0,invT=0;
var shakeAmt=0;
var spawnT=0,orbT=0;
var T2=0;

function reset(){
  score=0;orbs2=0;lives=3;dist2=0;spd2=8;boostT=0;invT=0;
  targetX=0;targetY=2;shakeAmt=0;spawnT=0;orbT=0;T2=0;
  player.position.set(0,2,0);

  // clear obstacles
  obstacles.forEach(function(o){scene.remove(o)});obstacles=[];
  orbs.forEach(function(o){scene.remove(o)});orbs=[];
  particles.forEach(function(p){scene.remove(p)});particles=[];
}

// ═══════════════ CONTROLS ═══════════════
var tx=0,ty2=0;
document.addEventListener('touchstart',function(e){e.preventDefault();tx=e.touches[0].clientX;ty2=e.touches[0].clientY},{passive:false});
document.addEventListener('touchmove',function(e){e.preventDefault();
  var dx=(e.touches[0].clientX-tx)/W;
  var dy=(e.touches[0].clientY-ty2)/H;
  targetX=clamp(targetX+dx*12,-8,8);
  targetY=clamp(targetY-dy*6,0.5,6);
  tx=e.touches[0].clientX;ty2=e.touches[0].clientY;
},{passive:false});
document.addEventListener('touchend',function(e){e.preventDefault();
  var dy=ty2-e.changedTouches[0].clientY;
  if(!state){startGame();return}
  if(dy>40&&boostT<=0){boostT=1.5;sfxBoost();emit(player.position.clone(),0xff00ff,15,3)}
},{passive:false});

var keys={};
document.addEventListener('keydown',function(e){keys[e.code]=true;if(e.code==='Space'&&boostT<=0&&state){boostT=1.5;sfxBoost();emit(player.position.clone(),0xff00ff,15,3)}});
document.addEventListener('keyup',function(e){keys[e.code]=false});

document.getElementById('title').addEventListener('touchend',function(e){e.preventDefault();startGame()},{passive:false});

function clamp(v,lo,hi){return v<lo?lo:v>hi?hi:v}

function startGame(){
  if(state)return;ea();
  state=1;
  reset();
  document.getElementById('title').classList.add('hide');
  document.getElementById('gameover').style.display='none';
  document.getElementById('hud').classList.add('on');
}

// ═══════════════ UPDATE ═══════════════
function update2(dt){
  T2+=dt;
  var ts=8+dist2/500;if(ts>22)ts=22;
  if(boostT>0){ts=28;boostT-=dt}
  spd2+=(ts-spd2)*.03;
  dist2+=spd2*dt;
  score=Math.floor(dist2);
  if(shakeAmt>.05)shakeAmt*=.88;else shakeAmt=0;
  if(invT>0)invT-=dt;

  // Keyboard input
  if(keys.ArrowLeft||keys.KeyA)targetX-=8*dt;
  if(keys.ArrowRight||keys.KeyD)targetX+=8*dt;
  if(keys.ArrowUp||keys.KeyW)targetY+=4*dt;
  if(keys.ArrowDown||keys.KeyS)targetY-=4*dt;
  targetX=clamp(targetX,-8,8);
  targetY=clamp(targetY,0.5,6);

  // Player movement (smooth)
  player.position.x+=(targetX-player.position.x)*.08;
  player.position.y+=(targetY-player.position.y)*.06;

  // Player tilt
  var dx=targetX-player.position.x;
  player.rotation.z=clamp(-dx*.15,-.5,.5);
  player.rotation.x=dx*.05;

  // Player hover
  player.position.y+=Math.sin(T2*3)*.02;

  // Engine pulse
  engine.scale.setScalar(1+Math.sin(T2*15)*.3);
  engLight.intensity=2+Math.sin(T2*15)*.8;
  if(boostT>0){engLight.intensity=5;engine.material.color.setHex(0x00ffff);engine.scale.setScalar(1.5)}
  else{engine.material.color.setHex(0xff00ff)}

  // Ship glow pulse
  shipGlow.material.opacity=.4+Math.sin(T2*4)*.2;

  // Invincibility flash
  shipBody.material.opacity=invT>0?(Math.sin(T2*20)>.0?.9:.2):.9;

  // Grid scroll
  gridMat.uniforms.uTime.value=T2;
  grid.position.z+=spd2*dt;
  if(grid.position.z>-20)grid.position.z=-200;

  // Sun
  sunMat.uniforms.uTime.value=T2;

  // Spawn
  spawnT-=dt;
  if(spawnT<=0){mkObstacle();spawnT=clamp(1.2-dist2/2000,0.35,1.2)}
  orbT-=dt;
  if(orbT<=0){mkOrb();orbT=0.6+Math.random()*0.8}

  // Move obstacles
  for(var oi=obstacles.length-1;oi>=0;oi--){
    var o=obstacles[oi];
    o.position.z+=spd2*dt;
    o.rotation.y+=dt*1.5;
    o.rotation.x+=dt*0.8;

    // Collision
    var dx2=Math.abs(player.position.x-o.position.x);
    var dy2=Math.abs(player.position.y-o.position.y);
    var dz2=Math.abs(player.position.z-o.position.z);
    var hw=(o.userData.w||2)/2+0.5;
    var hh=(o.userData.h||2)/2+0.3;
    if(dx2<hw&&dy2<hh&&dz2<1.5&&invT<=0){
      hit2();
    }

    // Passed
    if(o.position.z>10){
      scene.remove(o);obstacles.splice(oi,1);
      score+=10;
    }
  }

  // Move orbs
  for(var ri=orbs.length-1;ri>=0;ri--){
    var orb=orbs[ri];
    orb.position.z+=spd2*dt;
    orb.rotation.y+=dt*3;
    orb.position.y+=Math.sin(T2*4+ri)*.01;

    // Collect
    var d=Math.hypot(player.position.x-orb.position.x,player.position.y-orb.position.y,player.position.z-orb.position.z);
    if(d<1.5){
      orbs2++;score+=50;
      sfxCollect();
      emit(orb.position.clone(),0xff00ff,8,2);
      scene.remove(orb);orbs.splice(ri,1);
      continue;
    }

    if(orb.position.z>10){scene.remove(orb);orbs.splice(ri,1)}
  }

  // Particles
  for(var pi=particles.length-1;pi>=0;pi--){
    var p=particles[pi];
    p.position.x+=p.userData.vx*dt;
    p.position.y+=p.userData.vy*dt;
    p.position.z+=p.userData.vz*dt+spd2*dt*.3;
    p.userData.life-=dt*1.5;
    p.material.opacity=Math.max(0,p.userData.life);
    p.scale.setScalar(p.userData.life);
    if(p.userData.life<=0){scene.remove(p);particles.splice(pi,1)}
  }

  // Engine trail
  if(Math.random()>.4){
    var tp=new THREE.Mesh(
      new THREE.SphereGeometry(0.06+Math.random()*.06,4,4),
      new THREE.MeshBasicMaterial({color:boostT>0?0x00ffff:0xff00ff,transparent:true,opacity:.7})
    );
    tp.position.set(player.position.x+(Math.random()-.5)*.2,player.position.y+(Math.random()-.5)*.2,player.position.z+.8);
    tp.userData.vx=(Math.random()-.5)*.5;
    tp.userData.vy=(Math.random()-.5)*.5;
    tp.userData.vz=spd2*.3;
    tp.userData.life=.5;
    scene.add(tp);particles.push(tp);
  }

  // Camera shake
  if(shakeAmt>.05){
    camera.position.x=0+(Math.random()-.5)*shakeAmt;
    camera.position.y=4+(Math.random()-.5)*shakeAmt;
  }else{
    camera.position.x+=(0-camera.position.x)*.1;
    camera.position.y+=(4-camera.position.y)*.1;
  }

  // HUD
  document.getElementById('sc').textContent=score;
  document.getElementById('ob').textContent='⚡'+orbs2;
  var hearts='';for(var hi=0;hi<lives;hi++)hearts+='♥';
  document.getElementById('lv').textContent=hearts;
  document.getElementById('fill').style.width=Math.min(100,spd2/22*100)+'%';
}

function hit2(){
  if(invT>0)return;
  lives--;
  sfxHit();
  shakeAmt=1;
  emit(player.position.clone(),0xff0044,20,4);
  invT=2;
  if(lives<=0){
    state=0;
    var go=document.getElementById('gameover');
    go.style.display='flex';
    document.getElementById('gs').textContent='Score: '+score;
    document.getElementById('go').textContent='Orbs: '+orbs2;
    document.getElementById('gd').textContent='Distance: '+Math.floor(dist2)+'m';
  }
}

// ═══════════════ RENDER LOOP ═══════════════
var lt2=0;
function loop(ts){
  var dt=Math.min((ts-lt2)/1000,.05);lt2=ts;
  if(state)update2(dt);
  renderer.render(scene,camera);
  requestAnimationFrame(loop);
}

requestAnimationFrame(loop);
</script>
</body>
</html>
