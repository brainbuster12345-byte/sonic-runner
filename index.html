<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no,maximum-scale=1">
<title>Sonic Run</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden;background:#000;touch-action:none;-webkit-user-select:none;user-select:none;font-family:'Helvetica Neue',Arial,sans-serif}
canvas{display:block}
.overlay{position:fixed;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:20;transition:opacity .4s}
.overlay.hidden{opacity:0;pointer-events:none}
#title{background:radial-gradient(ellipse at 50% 40%,#0d2847 0%,#070d1a 100%)}
#title .logo{font-family:'Arial Black',Impact,sans-serif;font-size:clamp(48px,12vw,80px);letter-spacing:6px;background:linear-gradient(180deg,#64DD17 0%,#2979FF 40%,#0D47A1 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;filter:drop-shadow(0 4px 12px rgba(41,121,255,.4));margin-bottom:4px}
#title .sub{color:#90CAF9;font-size:clamp(11px,2.5vw,14px);letter-spacing:8px;text-transform:uppercase;margin-bottom:40px}
.prompt{color:rgba(255,255,255,.65);font-size:15px;animation:breathe 2.5s ease-in-out infinite}
@keyframes breathe{0%,100%{opacity:.35}50%{opacity:1}}
#gameover{background:rgba(0,0,0,.88);display:none}
#gameover h1{font-family:'Arial Black',sans-serif;font-size:44px;color:#FF1744;text-shadow:0 0 30px rgba(255,23,68,.4)}
#gameover .stat{color:#FFD740;font-size:22px;margin:8px 0}
#gameover .prompt{margin-top:28px}
#hud{position:fixed;top:0;left:0;right:0;padding:10px 16px;display:none;justify-content:space-between;pointer-events:none;z-index:15}
#hud.show{display:flex}
.hl{display:flex;flex-direction:column;gap:2px}
.hr{text-align:right}
.hud-val{font-weight:900;text-shadow:0 2px 6px rgba(0,0,0,.9)}
#hScore{color:#FFD740;font-size:clamp(16px,4vw,22px)}
#hRings{color:#FFD740;font-size:clamp(14px,3.5vw,20px)}
#hCombo{color:#69F0AE;font-size:14px;opacity:0;transition:opacity .25s}
#hCombo.on{opacity:1}
#hLives{color:#FF5252;font-size:16px}
#spdWrap{margin-top:6px;width:80px;height:5px;background:rgba(255,255,255,.1);border-radius:3px;overflow:hidden}
#spdBar{height:100%;width:30%;background:linear-gradient(90deg,#2979FF,#FF1744);border-radius:3px;transition:width .15s}
</style>
</head>
<body>
<canvas id="c"></canvas>

<div id="hud">
  <div class="hl">
    <div class="hud-val" id="hScore">0</div>
    <div class="hud-val" id="hRings">💍 0</div>
    <div id="hCombo"></div>
    <div id="spdWrap"><div id="spdBar"></div></div>
  </div>
  <div class="hr">
    <div class="hud-val" id="hLives">❤️×3</div>
  </div>
</div>

<div class="overlay" id="title">
  <div class="logo">SONIC RUN</div>
  <div class="sub">tap to start</div>
</div>

<div class="overlay" id="gameover">
  <h1>GAME OVER</h1>
  <div class="stat" id="goS"></div>
  <div class="stat" id="goR"></div>
  <div class="stat" id="goD"></div>
  <div class="prompt">tap to retry</div>
</div>

<script>
"use strict";
// ═══════════════ CANVAS ═══════════════
const cv=document.getElementById('c'),cx=cv.getContext('2d');
let W,H;
function resize(){W=innerWidth;H=innerHeight;cv.width=W*2;cv.height=H*2;cv.style.width=W+'px';cv.style.height=H+'px';cx.setTransform(2,0,0,2,0,0)}
resize();onresize=resize;

// ═══════════════ AUDIO ═══════════════
let ac;
function audio(){if(!ac)ac=new(AudioContext||webkitAudioContext)()}
function tone(f,d,t,v){if(!ac)return;const o=ac.createOscillator(),g=ac.createGain();o.type=t||'square';o.frequency.value=f;g.gain.setValueAtTime(v||.06,ac.currentTime);g.gain.exponentialRampToValueAtTime(.001,ac.currentTime+d);o.connect(g).connect(ac.destination);o.start();o.stop(ac.currentTime+d)}
function sfxRing(){tone(1200,.07,'sine',.05);setTimeout(()=>tone(1800,.09,'sine',.04),35)}
function sfxJump(){tone(280,.12,'triangle',.05);setTimeout(()=>tone(560,.08,'triangle',.04),40)}
function sfxSpin(){tone(500,.05,'sawtooth',.04);setTimeout(()=>tone(650,.05,'sawtooth',.04),25);setTimeout(()=>tone(800,.05,'sawtooth',.03),50)}
function sfxHit(){tone(120,.25,'sawtooth',.07);tone(60,.35,'square',.05)}
function sfxSpring(){tone(440,.08,'sine',.05);setTimeout(()=>tone(880,.12,'sine',.04),50)}
function sfxDest(){tone(180,.12,'sawtooth',.05);setTimeout(()=>tone(700,.08,'sine',.04),60)}

// ═══════════════ STATE ═══════════════
let gs='title',score=0,rings=0,lives=3,dist=0;
let spd=0,tSpd=5,combo=0,comboT=0;
let shake=0,flashA=0,t=0,dt=0,lastT=0;
let GY;// ground Y

// ═══════════════ HELPERS ═══════════════
const TAU=Math.PI*2;
const lerp=(a,b,t)=>a+(b-a)*t;
const clamp=(v,lo,hi)=>v<lo?lo:v>hi?hi:v;
const rand=(a,b)=>a+Math.random()*(b-a);
const rng=(n)=>Math.random()*n;

// ═══════════════ PARALLAX BG ═══════════════
let stars=[],fMount=[],nMount=[],clouds=[],bushes=[];
function initBG(){
  stars=[];fMount=[];nMount=[];clouds=[];bushes=[];
  for(let i=0;i<100;i++)stars.push({x:rng(W*2),y:rng(H*.55),s:rng(1.5)+.3,p:rng(TAU)});
  for(let i=0;i<14;i++)fMount.push({x:i*180-90,h:rng(100)+60,w:rng(120)+100});
  for(let i=0;i<20;i++)nMount.push({x:i*130-50,h:rng(60)+30,w:rng(80)+60});
  for(let i=0;i<7;i++)clouds.push({x:rng(W*3),y:rng(H*.28)+10,w:rng(100)+50,sp:rng(.12)+.08});
  for(let i=0;i<30;i++)bushes.push({x:i*80+rng(40),h:rng(25)+15,tp:Math.floor(rng(3))});
}

// ═══════════════ SONIC ═══════════════
const S={x:0,y:0,w:28,h:40,vx:0,vy:0,gnd:false,jmp:false,spin:false,spinT:0,hitT:0,invT:0,rf:0,rt:0,sqX:1,sqY:1,face:1,boostT:0,trail:[],homingT:0,dustT:0,landSquash:0};
function resetS(){Object.assign(S,{x:W*.18,y:GY-50,vx:0,vy:0,gnd:false,jmp:false,spin:false,spinT:0,hitT:0,invT:0,rf:0,rt:0,sqX:1,sqY:1,face:1,boostT:0,trail:[],homingT:0,dustT:0,landSquash:0})}

// ═══════════════ WORLD ═══════════════
let plats=[],rList=[],enms=[],springs=[],spikes=[],mons=[],parts=[];
let chunkAt=0;const CW=550;

function mkChunk(sx){
  const r=Math.random;
  // ground
  plats.push({x:sx,y:GY,w:CW,h:300,tp:'g'});
  const L=r();
  if(L<.22){
    // ring arc
    for(let i=0;i<9;i++)rList.push({x:sx+70+i*50,y:GY-55-Math.sin(i/8*TAU/2)*75,got:false,sp:rng(TAU)});
  }else if(L<.38){
    // float platform + rings
    const pw=rng(80)+90,py=GY-75-rng(55),px=sx+rng(200)+80;
    plats.push({x:px,y:py,w:pw,h:12,tp:'f',ph:rng(TAU)});
    for(let i=0;i<5;i++)rList.push({x:px+15+i*22,y:py-28,got:false,sp:rng(TAU)});
  }else if(L<.52){
    // enemies
    enms.push(mkE(sx+180,GY,'bug'));
    enms.push(mkE(sx+380,GY,'crab'));
    for(let i=0;i<6;i++)rList.push({x:sx+60+i*45,y:GY-35-rng(30),got:false,sp:rng(TAU)});
  }else if(L<.66){
    // spring section
    springs.push({x:sx+180,y:GY-14,pw:1.6});
    plats.push({x:sx+120,y:GY-170,w:220,h:12,tp:'f',ph:0});
    for(let i=0;i<7;i++)rList.push({x:sx+135+i*28,y:GY-200,got:false,sp:rng(TAU)});
    mons.push({x:sx+230,y:GY-200,tp:'ring',dead:false});
  }else if(L<.8){
    // spikes + enemy
    spikes.push({x:sx+140,y:GY-6,w:70});
    for(let i=0;i<4;i++)rList.push({x:sx+155+i*25,y:GY-65,got:false,sp:rng(TAU)});
    enms.push(mkE(sx+360,GY-80,'bee'));
  }else{
    // stepped
    for(let i=0;i<3;i++){
      const px2=sx+90+i*150,py2=GY-45-i*42;
      plats.push({x:px2,y:py2,w:75,h:12,tp:'f',ph:i*2});
      rList.push({x:px2+25,y:py2-22,got:false,sp:rng(TAU)});
      rList.push({x:px2+48,y:py2-22,got:false,sp:rng(TAU)});
    }
    springs.push({x:sx+480,y:GY-14,pw:1.7});
  }
  if(r()>.5)for(let i=0,n=Math.floor(rng(4))+2;i<n;i++)
    rList.push({x:sx+rng(CW),y:GY-25-rng(40),got:false,sp:rng(TAU)});
  chunkAt=sx+CW;
}

function mkE(x,y,tp){
  const e={x,y,tp,alive:true,fr:0,dir:-1,sx:x};
  if(tp==='bee'){e.y=y-85;e.hp=rng(TAU)}
  if(tp==='crab'){e.sx=x;e.pr=75}
  return e;
}

// ═══════════════ PARTICLES ═══════════════
function emit(px,py,col,n,o={}){
  for(let i=0;i<n;i++)parts.push({x:px,y:py,vx:(Math.random()-.5)*(o.sp||5),vy:-Math.random()*(o.up||3)-.5,life:1,col,sz:(o.sz||2.5)+rng(2),gv:o.gv??.12})
}

// ═══════════════ COLLISION ═══════════════
function hit(ax,ay,aw,ah,bx,by,bw,bh){return ax<bx+bw&&ax+aw>bx&&ay<by+bh&&ay+ah>by}

// ═══════════════ UPDATE ═══════════════
function update(){
  if(gs!=='play')return;
  t+=dt;
  tSpd=5+dist/1800;if(tSpd>13)tSpd=13;
  if(S.boostT>0){tSpd=16;S.boostT-=dt}
  spd=lerp(spd,tSpd,.04);
  dist+=spd;score=Math.floor(dist/7);
  if(comboT>0){comboT-=dt}else{combo=0;document.getElementById('hCombo').classList.remove('on')}
  if(shake>.1)shake*=.82;else shake=0;
  if(flashA>0)flashA-=.04*dt*60;

  // physics
  S.vy+=.5;S.vy=clamp(S.vy,-18,14);
  S.x+=S.vx;S.y+=S.vy;
  S.vx*=.92;
  // stay at ~18% from left
  S.x=lerp(S.x,W*.18,.06);
  S.gnd=false;

  // platform collision
  plats.forEach(p=>{
    const py=p.tp==='f'?p.y+Math.sin(p.ph)*7:p.y;
    if(S.x+S.w>p.x&&S.x<p.x+p.w&&S.vy>=0&&S.y+S.h>py&&S.y+S.h<py+25){
      S.y=py-S.h;S.vy=0;S.gnd=true;S.jmp=false;S.spin=false;
      if(S.landSquash<.5){S.sqX=1.3;S.sqY=.7;S.landSquash=1;emit(S.x+S.w/2,S.y+S.h,'rgba(200,200,200,.5)',3,{sp:3,up:1,sz:1.5})}
    }
  });
  if(S.y>H+60){die();return}

  // squash recover
  S.sqX=lerp(S.sqX,1,.12);S.sqY=lerp(S.sqY,1,.12);
  S.landSquash=Math.max(0,S.landSquash-dt*2);

  // anim
  S.rt+=spd*.07;S.rf=Math.floor(S.rt)%8;
  if(S.hitT>0)S.hitT-=dt;if(S.invT>0)S.invT-=dt;
  if(S.spinT>0){S.spinT-=dt;if(S.spinT<=0)S.spin=false}
  if(S.homingT>0)S.homingT-=dt;
  if(S.dustT>0)S.dustT-=dt;

  // spawn
  while(chunkAt<dist+W+500)mkChunk(chunkAt);

  // cleanup
  const vl=dist-200,vr=dist+W+300;
  plats=plats.filter(p=>p.x+p.w>vl&&p.x<vr);
  rList=rList.filter(r=>r.x>vl&&r.x<vr);
  enms=enms.filter(e=>e.x>vl&&e.x<vr);
  springs=springs.filter(s=>s.x>vl);
  spikes=spikes.filter(s=>s.x+s.w>vl);
  mons=mons.filter(m=>m.x>vl);

  // enemies
  enms.forEach(e=>{
    if(!e.alive)return;e.fr+=dt;
    if(e.tp==='bug'){e.x-=1.4;if(Math.random()>.94)emit(e.x+18,e.y-6,'#FF6',1,{sp:1.5,up:0,sz:1.5,gv:-.01})}
    else if(e.tp==='crab'){if(e.x<e.sx-e.pr)e.dir=1;if(e.x>e.sx+e.pr)e.dir=-1;e.x+=e.dir*.7}
    else if(e.tp==='bee'){e.hp+=.035;e.x-=.9;e.y+=Math.sin(e.hp)*.7}
  });

  // ring collect
  rList.forEach(r=>{
    if(r.got)return;r.sp+=dt*2.5;
    if(S.x<r.x+12&&S.x+S.w>r.x-12&&S.y<r.y+12&&S.y+S.h>r.y-12){
      r.got=true;rings++;combo++;comboT=1.8;
      const pts=100*(combo>1?Math.min(combo,10):1);score+=pts;
      sfxRing();emit(r.x,r.y,'#FFD700',7,{sp:3.5,up:2.5,sz:1.8});
      if(combo>1){document.getElementById('hCombo').textContent='COMBO ×'+combo;document.getElementById('hCombo').classList.add('on')}
    }
  });

  // springs
  springs.forEach(sp=>{
    if(S.x+S.w>sp.x-14&&S.x<sp.x+28&&S.y+S.h>sp.y-8&&S.y+S.h<sp.y+25&&S.vy>0){
      S.vy=-13*sp.pw;S.jmp=true;S.gnd=false;S.sqX=.6;S.sqY=1.4;
      sfxSpring();emit(sp.x,sp.y,'#4CAF50',5,{sp:3,up:4})
    }
  });

  // spikes
  if(S.invT<=0)spikes.forEach(sp=>{
    if(hit(S.x+3,S.y+3,S.w-6,S.h-6,sp.x,sp.y-10,sp.w,12))hurt()
  });

  // monitors
  mons.forEach(m=>{
    if(m.dead)return;
    if(S.x+S.w>m.x&&S.x<m.x+26&&S.y+S.h>m.y&&S.y<m.y+26&&S.vy<0){
      m.dead=true;S.vy=2;
      if(m.tp==='ring'){rings+=10;score+=1000}
      sfxDest();emit(m.x+13,m.y+13,'#FF5722',14,{sp:6,up:5,sz:3.5})
    }
  });

  // enemy collision
  enms.forEach(e=>{
    if(!e.alive)return;
    const ew=34,eh=30,ex=e.x-ew/2,ey=e.y-eh;
    if(!hit(S.x+3,S.y+3,S.w-6,S.h-6,ex,ey,ew,eh))return;
    if(S.spin||S.homingT>0||S.vy>1.5){
      e.alive=false;S.vy=-7.5;combo++;comboT=1.8;
      const pts=200*Math.min(combo,10);score+=pts;
      sfxDest();emit(e.x,e.y-12,'#FF5722',14,{sp:7,up:5,sz:3.5});
      emit(e.x,e.y-12,'#FFD700',7,{sp:5,up:3});shake=5;flashA=.12
    }else if(S.invT<=0)hurt()
  });

  // dust
  if(S.gnd&&spd>3&&S.dustT<=0){emit(S.x-S.face*8,S.y+S.h,'rgba(180,180,180,.4)',1,{sp:1.5,up:.5,sz:1.2,gv:.03});S.dustT=.08}
  // trail
  if(spd>8||S.boostT>0)S.trail.push({x:S.x+S.w/2,y:S.y+S.h/2,l:1});

  // particles
  parts.forEach(p=>{p.x+=p.vx;p.y+=p.vy;p.vy+=p.gv;p.life-=.028});
  parts=parts.filter(p=>p.life>0);
  S.trail.forEach(t2=>t2.l-=.07);S.trail=S.trail.filter(t2=>t2.l>0);

  // HUD
  document.getElementById('hScore').textContent=score;
  document.getElementById('hRings').textContent='💍 '+rings;
  document.getElementById('hLives').textContent='❤️×'+lives;
  document.getElementById('spdBar').style.width=Math.min(100,spd/16*100)+'%';
}

function hurt(){
  if(S.invT>0)return;
  if(rings>0){
    const lost=Math.min(rings,20);
    for(let i=0;i<lost;i++){const a=i/lost*TAU;rList.push({x:S.x+S.w/2+Math.cos(a)*18,y:S.y+S.h/2+Math.sin(a)*18,got:false,sp:0,vx:Math.cos(a)*2.5,vy:Math.sin(a)*2.5-2,tmp:true,life:2})}
    rings=Math.max(0,rings-lost);S.hitT=1.5;S.invT=2.2;S.vy=-5.5;
    sfxHit();emit(S.x+S.w/2,S.y+S.h/2,'#FFD700',18,{sp:9,up:4,sz:2.5});shake=8;flashA=.2
  }else die()
}

function die(){
  lives--;sfxHit();shake=12;flashA=.35;
  emit(S.x+S.w/2,S.y+S.h/2,'#2979FF',25,{sp:9,up:7,sz:3.5});
  if(lives<=0){
    gs='dead';document.getElementById('gameover').style.display='flex';
    document.getElementById('goS').textContent='Score: '+score;
    document.getElementById('goR').textContent='Rings: '+rings;
    document.getElementById('goD').textContent='Distance: '+Math.floor(dist/10)+'m'
  }else{S.invT=3;S.y=GY-55;S.vy=0;S.jmp=true}
}

// ═══════════════ DRAW ═══════════════
function drawBG(){
  // sky
  const g=cx.createLinearGradient(0,0,0,H);
  g.addColorStop(0,'#060e1e');g.addColorStop(.25,'#0b1f3d');g.addColorStop(.55,'#1565C0');g.addColorStop(.8,'#42A5F5');g.addColorStop(1,'#90CAF9');
  cx.fillStyle=g;cx.fillRect(0,0,W,H);
  // stars
  stars.forEach(s=>{
    const sx2=((s.x-dist*.015)%(W*2)+W*2)%(W*2)-W*.3;
    cx.globalAlpha=.25+Math.sin(t*1.5+s.p)*.25;cx.fillStyle='#fff';
    cx.beginPath();cx.arc(sx2,s.y,s.s,0,TAU);cx.fill()
  });cx.globalAlpha=1;
  // far mt
  cx.fillStyle='#091c33';fMount.forEach(m=>{
    const mx=((m.x-dist*.08)%(180*14)+180*14)%(180*14)-90;
    cx.beginPath();cx.moveTo(mx,H*.62);cx.lineTo(mx+m.w/2,H*.62-m.h);cx.lineTo(mx+m.w,H*.62);cx.fill()
  });
  // near mt
  cx.fillStyle='#0d2e52';nMount.forEach(m=>{
    const mx=((m.x-dist*.2)%(130*20)+130*20)%(130*20)-50;
    cx.beginPath();cx.moveTo(mx,H*.7);cx.quadraticCurveTo(mx+m.w/2,H*.7-m.h,mx+m.w,H*.7);cx.fill()
  });
  // clouds
  clouds.forEach(c=>{
    c.x-=c.sp;if(c.x+c.w<-80){c.x=W+80+rng(200)}
    cx.fillStyle='rgba(160,210,255,.06)';
    cx.beginPath();cx.ellipse(c.x-dist*.12,c.y,c.w,16,0,0,TAU);cx.fill();
    cx.beginPath();cx.ellipse(c.x-dist*.12-c.w*.28,c.y+5,c.w*.5,11,0,0,TAU);cx.fill()
  });
  // bushes / trees
  bushes.forEach(b=>{
    const bx=((b.x-dist*.45)%(80*30)+80*30)%(80*30);
    cx.fillStyle='#1B5E20';
    if(b.tp===0){cx.beginPath();cx.moveTo(bx,GY);cx.lineTo(bx+10,GY-b.h);cx.lineTo(bx+20,GY);cx.fill()}
    else if(b.tp===1){cx.beginPath();cx.arc(bx+10,GY-b.h*.55,14,0,TAU);cx.fill();cx.fillStyle='#33691E';cx.fillRect(bx+8,GY-b.h*.25,4,b.h*.25)}
    else{cx.beginPath();cx.ellipse(bx+10,GY-7,16,10,0,0,TAU);cx.fill()}
  });
  // ground
  const gg=cx.createLinearGradient(0,GY,0,GY+16);gg.addColorStop(0,'#43A047');gg.addColorStop(1,'#2E7D32');
  cx.fillStyle=gg;cx.fillRect(0,GY,W,16);
  // checker
  const ts=16,ox=-(dist%ts);
  for(let c2=-1;c2<W/ts+2;c2++)for(let r2=0;r2<(H-GY)/ts+1;r2++){
    cx.fillStyle=((c2+Math.floor(dist/ts)+r2)%2===0)?'#E65100':'#BF360C';
    cx.fillRect(ox+c2*ts,GY+16+r2*ts,ts,ts)
  }
  // grass
  cx.strokeStyle='#66BB6A';cx.lineWidth=1.2;
  for(let gx=0;gx<W;gx+=10){const gx2=gx+((dist*1.3)%10);const sw=Math.sin(t*3.5+gx*.12)*1.8;
    cx.beginPath();cx.moveTo(gx2,GY);cx.quadraticCurveTo(gx2+sw,GY-5,gx2+sw*1.4,GY-9);cx.stroke()}
}

function drawPlats(){
  plats.forEach(p=>{
    if(p.tp==='f'){
      const py=p.y+Math.sin(p.ph)*7;
      cx.fillStyle='#4E342E';cx.fillRect(p.x,py,p.w,p.h);
      cx.fillStyle='#6D4C41';cx.fillRect(p.x,py,p.w,3);
      cx.fillStyle='#8D6E63';
      for(let rx=p.x+8;rx<p.x+p.w-4;rx+=18){cx.beginPath();cx.arc(rx,py+p.h/2,1.8,0,TAU);cx.fill()}
      cx.fillStyle='rgba(0,0,0,.15)';cx.fillRect(p.x+3,py+p.h,p.w-6,5)
    }
  })
}

function drawRings(){
  rList.forEach(r=>{
    if(r.got){
      if(r.tmp){r.x+=r.vx||0;r.y+=r.vy||0;r.vy=(r.vy||0)+.14;r.life-=.022;if(r.life<=0)return}
      else return
    }
    const sz=9,sh=Math.sin(r.sp)*.1;
    cx.save();cx.translate(r.x,r.y);cx.scale(1+sh,1-sh);
    cx.shadowColor='#FFD700';cx.shadowBlur=10;
    cx.beginPath();cx.arc(0,0,sz,0,TAU);cx.fillStyle='#FFD700';cx.fill();cx.strokeStyle='#FFA000';cx.lineWidth=1.8;cx.stroke();
    cx.shadowBlur=0;
    cx.beginPath();cx.arc(0,0,sz*.4,0,TAU);cx.fillStyle='#FFF8E1';cx.fill();
    cx.beginPath();cx.arc(-2.5,-2.5,2.5,0,TAU);cx.fillStyle='rgba(255,255,255,.65)';cx.fill();
    cx.restore()
  })
}

// ═══════ SONIC SPRITE ═══════
function drawSonic(){
  const{x,y,w,h,spin,spinT,hitT,invT,rf,sqX,sqY,face,gnd,jmp,vy,trail}=S;
  if(invT>0&&Math.floor(invT*14)%2===0)return;
  // trail
  trail.forEach(t2=>{
    cx.globalAlpha=t2.l*.25;cx.fillStyle=S.boostT>0?'#FF3D00':'#2979FF';
    cx.beginPath();cx.arc(t2.x,t2.y,9*t2.l,0,TAU);cx.fill()
  });cx.globalAlpha=1;

  cx.save();cx.translate(x+w/2,y+h/2);cx.scale(face*sqX,sqY);

  if(spin>0&&spinT>0){
    // SPIN DASH BALL
    cx.rotate(t*22);
    // core
    cx.beginPath();cx.arc(0,0,w*.42,0,TAU);cx.fillStyle='#1565C0';cx.fill();
    cx.strokeStyle='#2979FF';cx.lineWidth=2;cx.stroke();
    // spikes on ball
    for(let i=0;i<6;i++){cx.save();cx.rotate(i*TAU/6);
      cx.beginPath();cx.moveTo(w*.36,-2);cx.lineTo(w*.62,0);cx.lineTo(w*.36,2);
      cx.fillStyle='#0D47A1';cx.fill();cx.restore()}
    // eye flash
    cx.fillStyle='#fff';cx.beginPath();cx.arc(-5,-3,4,0,TAU);cx.fill();
    cx.beginPath();cx.arc(5,-3,4,0,TAU);cx.fill();
    cx.fillStyle='#111';cx.beginPath();cx.arc(-4,-3,2,0,TAU);cx.fill();
    cx.beginPath();cx.arc(6,-3,2,0,TAU);cx.fill();
  }else{
    // FULL SONIC
    const bnc=gnd?Math.sin(t*14)*1.2:0;
    const lean=gnd?Math.sin(t*7)*.02:0;
    cx.rotate(lean);cx.translate(0,bnc);

    // shadow
    if(gnd){cx.fillStyle='rgba(0,0,0,.18)';cx.beginPath();cx.ellipse(0,h/2+3,w*.38,3.5,0,0,TAU);cx.fill()}

    // === LEGS ===
    const lSpd=spd>0?Math.min(spd,14):0;
    const la=gnd?Math.sin(t*(3.5+lSpd))*10:0;
    const la2=gnd?Math.sin(t*(3.5+lSpd)+Math.PI)*10:0;

    // back leg
    cx.save();cx.translate(-3,gnd?h*.28:-h*.02);
    if(gnd){cx.rotate(la2*.03)}
    else{cx.rotate(-.35)}
    cx.fillStyle='#D32F2F';cx.beginPath();cx.ellipse(0,0,5.5,8,0,0,TAU);cx.fill();
    cx.fillStyle='#B71C1C';cx.beginPath();cx.ellipse(1,gnd?la2*.04+6:-4,8,3.5,0,0,TAU);cx.fill();
    cx.fillStyle='#fff';cx.beginPath();cx.ellipse(2,gnd?la2*.04+5:-5,5,1.5,0,0,TAU);cx.fill();
    cx.restore();

    // === BODY ===
    cx.beginPath();cx.ellipse(0,2,w*.34,h*.33,0,0,TAU);cx.fillStyle='#1565C0';cx.fill();
    // chest
    cx.beginPath();cx.ellipse(1,7,w*.21,h*.17,.08,0,TAU);cx.fillStyle='#BBDEFB';cx.fill();
    // belly highlight
    cx.beginPath();cx.ellipse(-1,5,w*.12,h*.1,.1,0,TAU);cx.fillStyle='rgba(255,255,255,.08)';cx.fill();

    // === ARMS ===
    cx.fillStyle='#1976D2';
    // back arm
    cx.save();cx.translate(-w*.28,0);cx.rotate(gnd?la*.015:.2);
    cx.beginPath();cx.ellipse(0,4,4,8,.15,0,TAU);cx.fill();
    cx.fillStyle='#BBDEFB';cx.beginPath();cx.arc(1,11,3.5,0,TAU);cx.fill();
    cx.restore();
    // front arm
    cx.save();cx.translate(w*.28,0);cx.rotate(gnd?-la*.015:-.15);
    cx.fillStyle='#1976D2';cx.beginPath();cx.ellipse(0,4,4,8,-.15,0,TAU);cx.fill();
    cx.fillStyle='#BBDEFB';cx.beginPath();cx.arc(-1,11,3.5,0,TAU);cx.fill();
    cx.restore();

    // === HEAD ===
    cx.beginPath();cx.ellipse(1,-h*.19,w*.33,h*.29,.08,0,TAU);cx.fillStyle='#1976D2';cx.fill();

    // === SPIKES (back) ===
    cx.fillStyle='#0D47A1';
    const spk=[-2.6,-1.9,-1.2,-.5];
    spk.forEach((a,i)=>{cx.save();cx.rotate(a+.08);
      cx.beginPath();cx.moveTo(-w*.18,-2);
      const sl=14+i*3;cx.lineTo(-w*.18-sl,-3+i*1.5);cx.lineTo(-w*.18-sl+3,5);
      cx.fill();cx.restore()});
    // front spikes
    cx.fillStyle='#1565C0';
    [-.3,.25,.7].forEach(a=>{cx.save();cx.rotate(a);
      cx.beginPath();cx.moveTo(w*.24,-7);cx.lineTo(w*.52,-3);cx.lineTo(w*.2,3);
      cx.fill();cx.restore()});

    // === EARS ===
    cx.fillStyle='#1565C0';
    cx.save();cx.translate(-w*.2,-h*.3);cx.rotate(-.3);cx.beginPath();cx.ellipse(0,0,5,8,0,0,TAU);cx.fill();cx.restore();
    cx.save();cx.translate(w*.22,-h*.28);cx.rotate(.3);cx.beginPath();cx.ellipse(0,0,5,8,0,0,TAU);cx.fill();cx.restore();

    // === EYES ===
    const pOff=vy<-3?-2:vy>3?2:0;
    cx.fillStyle='#fff';
    cx.beginPath();cx.ellipse(-3,-h*.23,6.5,9,-.08,0,TAU);cx.fill();
    cx.beginPath();cx.ellipse(9,-h*.21,6.5,9,.08,0,TAU);cx.fill();
    // pupils
    cx.fillStyle='#1a1a1a';
    cx.beginPath();cx.arc(-1,-h*.23+pOff,3,0,TAU);cx.fill();
    cx.beginPath();cx.arc(11,-h*.21+pOff,3,0,TAU);cx.fill();
    // eye shine
    cx.fillStyle='#fff';
    cx.beginPath();cx.arc(0,-h*.25,1.3,0,TAU);cx.fill();
    cx.beginPath();cx.arc(12,-h*.23,1.3,0,TAU);cx.fill();

    // === NOSE ===
    cx.beginPath();cx.ellipse(15,-h*.12,4.5,3.2,.15,0,TAU);cx.fillStyle='#0D47A1';cx.fill();
    // nose shine
    cx.beginPath();cx.arc(14,-h*.135,1.5,0,TAU);cx.fillStyle='rgba(255,255,255,.2)';cx.fill();

    // === MOUTH ===
    cx.strokeStyle='#0D47A1';cx.lineWidth=1.3;
    cx.beginPath();cx.arc(11,-h*.06,4.5,.15,1.1);cx.stroke();

    // === FRONT LEG ===
    cx.save();cx.translate(3,gnd?h*.28:-h*.02);
    if(gnd){cx.rotate(la*.03)}
    else{cx.rotate(.35)}
    cx.fillStyle='#E53935';cx.beginPath();cx.ellipse(0,0,5.5,8,0,0,TAU);cx.fill();
    cx.fillStyle='#C62828';cx.beginPath();cx.ellipse(-1,gnd?la*.04+6:-4,8,3.5,0,0,TAU);cx.fill();
    cx.fillStyle='#fff';cx.beginPath();cx.ellipse(-2,gnd?la*.04+5:-5,5,1.5,0,0,TAU);cx.fill();
    cx.restore();

    // === BOOST GLOW ===
    if(S.boostT>0){
      cx.shadowColor='#FF3D00';cx.shadowBlur=20;
      cx.beginPath();cx.arc(0,0,w*.5,0,TAU);cx.fillStyle='rgba(255,61,0,.12)';cx.fill();
      cx.shadowBlur=0
    }
  }
  cx.restore()
}

function drawEnms(){
  enms.forEach(e=>{
    if(!e.alive)return;
    cx.save();cx.translate(e.x,e.y);
    if(e.tp==='bug'){
      cx.fillStyle='#D32F2F';cx.beginPath();cx.ellipse(0,-9,20,11,0,0,TAU);cx.fill();
      cx.fillStyle='#B71C1C';cx.beginPath();cx.ellipse(0,-13,16,7,0,Math.PI,TAU);cx.fill();
      cx.fillStyle='#fff';cx.beginPath();cx.arc(9,-13,4.5,0,TAU);cx.fill();
      cx.fillStyle='#111';cx.beginPath();cx.arc(11,-13,2.2,0,TAU);cx.fill();
      cx.fillStyle='#333';cx.beginPath();cx.arc(-9,0,5.5,0,TAU);cx.fill();cx.beginPath();cx.arc(9,0,5.5,0,TAU);cx.fill();
      const fk=Math.sin(t*20)*3;
      cx.fillStyle='#FF9800';cx.beginPath();cx.moveTo(-20,-11);cx.lineTo(-28-fk,-9);cx.lineTo(-20,-7);cx.fill();
      cx.fillStyle='#FFC107';cx.beginPath();cx.moveTo(-20,-10);cx.lineTo(-24-fk*.5,-9);cx.lineTo(-20,-8);cx.fill()
    }else if(e.tp==='crab'){
      cx.fillStyle='#E53935';cx.beginPath();cx.ellipse(0,-9,17,9,0,0,TAU);cx.fill();
      cx.fillStyle='#C62828';cx.beginPath();cx.ellipse(0,-12,13,5,0,Math.PI,TAU);cx.fill();
      const ca=Math.sin(e.fr*4)*4;
      cx.fillStyle='#D32F2F';
      cx.beginPath();cx.ellipse(-21,-13+ca,6.5,4.5,-.4,0,TAU);cx.fill();
      cx.beginPath();cx.ellipse(21,-13-ca,6.5,4.5,.4,0,TAU);cx.fill();
      cx.fillStyle='#fff';cx.beginPath();cx.arc(-5,-13,3.5,0,TAU);cx.fill();cx.beginPath();cx.arc(5,-13,3.5,0,TAU);cx.fill();
      cx.fillStyle='#111';cx.beginPath();cx.arc(-4,-13,1.8,0,TAU);cx.fill();cx.beginPath();cx.arc(6,-13,1.8,0,TAU);cx.fill();
      cx.strokeStyle='#C62828';cx.lineWidth=1.8;
      const lf=Math.sin(e.fr*5.5)*2.5;
      [-11,-5.5,5.5,11].forEach((lx,i)=>{cx.beginPath();cx.moveTo(lx,-1);cx.lineTo(lx+(i%2?lf:-lf),4);cx.stroke()})
    }else{
      const wf=Math.sin(t*22)*4.5;
      cx.fillStyle='rgba(160,210,255,.5)';
      cx.beginPath();cx.ellipse(-13,-5+wf,11,5.5,-.3,0,TAU);cx.fill();
      cx.beginPath();cx.ellipse(13,-5-wf,11,5.5,.3,0,TAU);cx.fill();
      cx.fillStyle='#FDD835';cx.beginPath();cx.ellipse(0,0,9,13,0,0,TAU);cx.fill();
      cx.fillStyle='#333';cx.fillRect(-9,-2.5,18,2.5);cx.fillRect(-7,4.5,14,2.5);
      cx.fillStyle='#FBC02D';cx.beginPath();cx.arc(0,-11,6,0,TAU);cx.fill();
      cx.fillStyle='#fff';cx.beginPath();cx.arc(-2.5,-12,3.5,0,TAU);cx.fill();cx.beginPath();cx.arc(2.5,-12,3.5,0,TAU);cx.fill();
      cx.fillStyle='#111';cx.beginPath();cx.arc(-1.5,-12,1.8,0,TAU);cx.fill();cx.beginPath();cx.arc(3.5,-12,1.8,0,TAU);cx.fill();
      cx.fillStyle='#333';cx.beginPath();cx.moveTo(-2.5,13);cx.lineTo(0,18);cx.lineTo(2.5,13);cx.fill()
    }
    cx.restore()
  })
}

function drawSprings(){
  springs.forEach(s=>{
    const comp=Math.abs(S.x+S.w/2-s.x)<22&&S.y+S.h>s.y-3?.65:1;
    cx.save();cx.translate(s.x,s.y);cx.scale(1,comp);
    cx.fillStyle='#555';cx.fillRect(-11,0,22,7);
    cx.strokeStyle='#E53935';cx.lineWidth=2.5;cx.beginPath();cx.moveTo(-7,0);
    for(let i=0;i<3;i++){cx.lineTo(7,-5-i*5);cx.lineTo(-7,-10-i*5)}cx.stroke();
    cx.fillStyle='#D32F2F';cx.fillRect(-9,-19,18,5);
    cx.fillStyle='#E53935';cx.fillRect(-9,-19,18,2.5);
    cx.fillStyle='#FFC107';cx.beginPath();cx.moveTo(0,-25);cx.lineTo(-4,-21);cx.lineTo(4,-21);cx.fill();
    cx.restore()
  })
}

function drawSpikes(){
  spikes.forEach(sp=>{
    cx.save();cx.translate(sp.x,sp.y);
    const n=Math.floor(sp.w/14);
    for(let i=0;i<n;i++){cx.fillStyle=i%2?'#9E9E9E':'#BDBDBD';cx.beginPath();cx.moveTo(i*14,0);cx.lineTo(i*14+7,-10);cx.lineTo(i*14+14,0);cx.fill()}
    cx.restore()
  })
}

function drawMons(){
  mons.forEach(m=>{
    if(m.dead)return;
    cx.save();cx.translate(m.x+13,m.y+13);
    cx.fillStyle='#37474F';cx.fillRect(-12,-12,24,24);
    cx.fillStyle='#455A64';cx.fillRect(-10,-10,20,20);
    cx.fillStyle='#263238';cx.fillRect(-8,-8,16,14);
    cx.fillStyle='#FFD700';cx.beginPath();cx.arc(0,-1,5,0,TAU);cx.fill();
    cx.fillStyle='#263238';cx.beginPath();cx.arc(0,-1,2.5,0,TAU);cx.fill();
    cx.fillStyle='rgba(255,255,255,.08)';cx.fillRect(-10,-10,20,3);
    cx.restore()
  })
}

function drawParts(){
  parts.forEach(p=>{cx.globalAlpha=p.life;cx.fillStyle=p.col;cx.beginPath();cx.arc(p.x,p.y,p.sz*p.life,0,TAU);cx.fill()});
  cx.globalAlpha=1
}

function drawSpeedLines(){
  if(spd<8)return;const a=(spd-8)/8;
  cx.strokeStyle=`rgba(255,255,255,${.04*a})`;cx.lineWidth=1;
  for(let i=0;i<6*a;i++){const ly=rng(H),lx=rng(W),ln=spd*4+rng(25);cx.beginPath();cx.moveTo(lx,ly);cx.lineTo(lx-ln,ly);cx.stroke()}
}

// ═══════════════ MAIN LOOP ═══════════════
function frame(ts){
  dt=Math.min((ts-lastT)/1000,.05);lastT=ts;
  if(gs==='play')update();
  cx.clearRect(0,0,W,H);
  cx.save();
  if(shake>.3)cx.translate((Math.random()-.5)*shake,(Math.random()-.5)*shake);
  drawBG();drawPlats();drawSpikes();drawSprings();drawMons();drawRings();drawEnms();drawSonic();drawParts();drawSpeedLines();
  if(flashA>0){cx.fillStyle=`rgba(255,255,255,${flashA})`;cx.fillRect(0,0,W,H)}
  cx.restore();
  requestAnimationFrame(frame)
}

// ═══════════════ CONTROLS ═══════════════
function start(){
  if(gs==='play')return;
  audio();gs='play';score=0;rings=0;lives=3;dist=0;spd=5;tSpd=5;
  combo=0;comboT=0;shake=0;flashA=0;t=0;
  GY=H*.73;chunkAt=0;
  plats=[];rList=[];enms=[];springs=[];spikes=[];mons=[];parts=[];S.trail=[];
  initBG();resetS();
  document.getElementById('title').classList.add('hidden');
  document.getElementById('gameover').style.display='none';
  document.getElementById('hud').classList.add('show')
}

function jmp(){
  if(gs!=='play'){start();return}
  if(S.gnd){S.vy=-11.5;S.jmp=true;S.gnd=false;S.sqX=1.25;S.sqY=.75;sfxJump();emit(S.x+S.w/2,S.y+S.h,'rgba(255,255,255,.4)',3,{sp:2.5,up:1,sz:1.5})}
  else{
    let nr=null,nd=180;
    enms.forEach(e=>{if(!e.alive)return;const d=Math.hypot(e.x-S.x,e.y-S.y);if(d<nd){nr=e;nd=d}});
    if(nr&&S.homingT<=0){S.homingT=.25;const a=Math.atan2(nr.y-S.y,nr.x-S.x);S.vx=Math.cos(a)*10;S.vy=Math.sin(a)*10;S.spin=true;S.spinT=.4;sfxSpin()}
  }
}
function spD(){
  if(gs!=='play')return;
  if(S.gnd){S.spin=true;S.spinT=1.2;S.sqX=.5;S.sqY=1.5;sfxSpin();spd=Math.min(spd+3,16)}
}

// Touch
let ty=0;
document.addEventListener('touchstart',e=>{e.preventDefault();ty=e.touches[0].clientY},{passive:false});
document.addEventListener('touchend',e=>{e.preventDefault();const dy=ty-e.changedTouches[0].clientY;
  if(gs!=='play'){start();return}dy>20?jmp():dy<-20?spD():jmp()},{passive:false});
document.addEventListener('click',()=>{if(gs!=='play'){start();return}jmp()});
document.addEventListener('keydown',e=>{if(e.repeat)return;if(e.code==='Space'||e.code==='ArrowUp')jmp();if(e.code==='ArrowDown')spD()});

// ═══════════════ INIT ═══════════════
GY=H*.73;initBG();requestAnimationFrame(frame);
</script>
</body>
</html>
